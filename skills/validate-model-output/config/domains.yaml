# 변수 standard_name / 이름 패턴 → 도메인 (router 의 데이터원, taxonomy C절 기반)
#
# 각 도메인 블록:
#   standard_names : CF standard_name 직접 매칭 (강한 신호)
#   name_patterns  : 변수명 정규식(re.search, 소문자 기준) (약한 신호)
#   headline       : 그 도메인을 "정의"하는 대표변수 — 존재 시 가중 3표(다른 도메인의
#                    강제·부수 변수가 공존해도 이 도메인이 이기게)
#
# ★ 확장(전파성): 새 분야는 아래 형식으로 블록 1개만 추가하면 라우터가 자동 인식.
#   (도메인 카드가 없어도 router.characterize()가 데이터 특성 기반 일반 배터리로 진행한다.)
#   상세 절차·템플릿: references/extending.md
domains:
  meteorology:
    standard_names:
      - air_temperature
      - eastward_wind
      - northward_wind
      - air_pressure_at_mean_sea_level
      - relative_humidity
      - wind_speed        # aliases.yaml canonical key (풍속)
    name_patterns:
      - "^t2m$"
      - "^2t$"
      - "^tmp$"
      - "^u10$"
      - "^v10$"
      - "ugrd"
      - "vgrd"
      - "mslp"
      - "prmsl"
      - "dpt"
      - "dswrf"
      - "gust"
    headline: []          # 광역 도메인 — 대표변수 없음(강제변수로 다른 도메인을 덮지 않게)
  ocean_temp_salinity:
    standard_names:
      - sea_water_temperature
      - sea_surface_temperature
      - sea_water_salinity
      - sea_surface_salinity
    name_patterns:
      - "^sst$"
      - "^sss$"
      - "^thetao$"
      - "^so$"
      - "salin"
    headline:
      - sea_water_temperature
      - sea_surface_temperature
      - sea_water_salinity
      - sea_surface_salinity
  waves:
    standard_names:
      - sea_surface_wave_significant_height
      - significant_wave_height  # aliases.yaml canonical key (유의파고/hs/hm0/swh)
      - wave_period              # aliases.yaml canonical key (파주기/t01/tp)
      - wave_direction           # aliases.yaml canonical key (파향/dir/dp)
    name_patterns:
      - "^hs$"
      - "hm0"
      - "swh"
      - "^tp$"
      - "^tm0[12]$"
      - "^t0[12]$"
      - "mwd"
      - "^dp$"
    headline:
      - sea_surface_wave_significant_height
      - significant_wave_height
  currents:
    standard_names:
      - eastward_sea_water_velocity
      - northward_sea_water_velocity
    name_patterns:
      - "^uo$"
      - "^vo$"
      - "^ucur$"
      - "^vcur$"
    headline:
      - eastward_sea_water_velocity
      - northward_sea_water_velocity
  sea_level:
    standard_names:
      - sea_surface_height_above_geoid
      - sea_surface_height_above_reference_ellipsoid
    name_patterns:
      - "^ssh$"
      - "^sla$"
      - "^adt$"
      - "zos"
    headline:
      - sea_surface_height_above_geoid
      - sea_surface_height_above_reference_ellipsoid
  precipitation:
    standard_names:
      - precipitation_amount
      - precipitation_flux
      - lwe_precipitation_rate
      - thickness_of_rainfall_amount
      - rainfall_amount
      - rainfall_flux
      - rainfall_rate
      - lwe_thickness_of_precipitation_amount
      - lwe_thickness_of_stratiform_precipitation_amount
      - lwe_thickness_of_convective_precipitation_amount
      - lwe_stratiform_precipitation_rate
      - lwe_convective_precipitation_rate
      - convective_precipitation_flux
      - convective_precipitation_amount
      - stratiform_precipitation_flux
      - stratiform_precipitation_amount
      - large_scale_precipitation_amount
    name_patterns:
      - "precip"
      - "rainfall"
      - "(^|_)(apcp|prcp|prcptot|pcp)(_|$)"
      - "(qpe|qpf)"
      - "(imerg|gsmap|cmorph|gpcp|trmm)"
      - "rx[15]day|r95p|r99p|sdii"
    headline:
      - precipitation_flux
      - precipitation_amount
      - lwe_precipitation_rate
      - thickness_of_rainfall_amount
  sea_ice:
    standard_names:
      - sea_ice_area_fraction
      - sea_ice_thickness
      - sea_ice_x_velocity
      - sea_ice_y_velocity
      - sea_ice_speed
      - sea_ice_extent
      - sea_ice_volume
      - sea_ice_freeboard
      - sea_ice_classification
      - sea_ice_and_surface_snow_amount
      - surface_snow_thickness_where_sea_ice
      - age_of_sea_ice
    name_patterns:
      - "sea_ice"
      - "siconc"
      - "sithick"
      - "sivol"
      - "siextent"
      - "(^|_)ice_conc"
      - "ice_thick"
      - "ice_drift"
      - "ice_edge"
      - "siage"
    headline:
      - sea_ice_area_fraction
      - sea_ice_thickness
      - sea_ice_x_velocity
      - sea_ice_speed
  air_quality:
    standard_names:
      - mass_concentration_of_pm2p5_ambient_aerosol_in_air
      - mass_concentration_of_pm10_ambient_aerosol_in_air
      - mole_fraction_of_ozone_in_air
      - mass_concentration_of_ozone_in_air
      - mole_fraction_of_nitrogen_dioxide_in_air
      - mass_concentration_of_nitrogen_dioxide_in_air
      - mole_fraction_of_sulfur_dioxide_in_air
      - mass_concentration_of_sulfur_dioxide_in_air
      - mole_fraction_of_carbon_monoxide_in_air
      - atmosphere_optical_thickness_due_to_aerosol
      - atmosphere_optical_thickness_due_to_ambient_aerosol_particles
      - troposphere_mole_content_of_nitrogen_dioxide
      - atmosphere_mole_content_of_nitrogen_dioxide
      - mass_concentration_of_sulfate_dry_aerosol_in_air
      - mass_concentration_of_nitrate_dry_aerosol_in_air
      - mass_concentration_of_ammonium_dry_aerosol_in_air
      - mass_concentration_of_elemental_carbon_dry_aerosol_in_air
      - mole_fraction_of_formaldehyde_in_air
    name_patterns:
      - 'pm2\.?5'
      - "pm10"
      - "(^|_)o3(_|$)"
      - "ozone"
      - "(^|_)no2(_|$)"
      - "nitrogen_dioxide"
      - "(^|_)so2(_|$)"
      - "sulfur_dioxide|sulphur_dioxide"
      - "carbon_monoxide"
      - "(^|_)nox(_|$)"
      - "aod|aerosol_optical"
      - "optical_thickness_due_to_aerosol"
      - "(^|_)(so4|no3|nh4)(_|$)"
      - "formaldehyde|hcho"
    headline:
      - mass_concentration_of_pm2p5_ambient_aerosol_in_air
      - mole_fraction_of_ozone_in_air
      - mole_fraction_of_nitrogen_dioxide_in_air
      - atmosphere_optical_thickness_due_to_aerosol
  hydrology:
