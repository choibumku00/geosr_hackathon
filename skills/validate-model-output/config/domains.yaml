      - surface_upward_latent_heat_flux
      - surface_snow_amount
      - lwe_thickness_of_surface_snow_amount
      - surface_snow_area_fraction
      - leaf_area_index
      - surface_albedo
      - soil_temperature
      - gross_primary_productivity_of_biomass_expressed_as_carbon
    name_patterns:
