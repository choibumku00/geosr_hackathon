      - "(^|_)sm(_|$)"
      - "evapotransp"
      - "(^|_)swe(_|$)"
      - "snow_cover|snow_depth|snow_area"
      - "(^|_)lai(_|$)"
      - "albedo"
      - "(^|_)lst(_|$)"
