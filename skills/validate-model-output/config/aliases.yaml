# 변수 별칭 매핑: CF 표준명 → 모델/관측/재분석 별칭 + 한글 헤더
# SAMPLE — 실데이터 헤더가 다르면 이 파일에 항목을 추가/보강하라.
# 별칭은 소문자로 정규화해 매칭한다(aliases.py 참조).
aliases:
  significant_wave_height:
    - hs
    - hm0
    - swh
    - 유의파고
  wave_period:
    - t01
    - tp
    - fp
    - mwp
    - 파주기
  wave_direction:
    - dir
    - dp
    - mwd
    - 파향
  sea_water_temperature:
    - sst
    - thetao
    - 수온
  eastward_wind:
    - uwnd
    - u10
    - ugrd
  northward_wind:
    - vwnd
    - v10
    - vgrd
  wind_speed:
    - 풍속

  # ── 강수 (precipitation) ──
  precipitation_amount:
    - 강수량
    - 누적강수
    - 총강수량
    - prcp
    - prcptot
    - apcp
    - pcp
  precipitation_flux:
    - 강수
    - 강수율
    - pr
  lwe_precipitation_rate:
    - 강수강도
    - qpe
    - imerg
    - gsmap
    - cmorph
  rainfall_amount:
    - 강우량
    - 우량
    - 비
  rainfall_rate:
    - 강우강도
    - 시우량
    - rainrate
    - rain_rate
  thickness_of_rainfall_amount:
    - 일강수량
  convective_precipitation_flux:
    - 대류성강수
  stratiform_precipitation_flux:
    - 층운성강수

  # ── 해빙·빙권 (sea ice) ──
  sea_ice_area_fraction:
    - 해빙농도
    - siconc
    - sic
    - ice_conc
    - ice_concentration
  sea_ice_thickness:
    - 해빙두께
    - sithick
    - sit
    - ice_thickness
  sea_ice_volume:
    - 해빙부피
    - sivol
  sea_ice_extent:
    - 해빙범위
    - siextent
  sea_ice_x_velocity:
    - siu
    - ice_u
  sea_ice_y_velocity:
    - ice_v
  sea_ice_speed:
    - 해빙표류
    - ice_drift
    - sispeed
  age_of_sea_ice:
    - 해빙나이
    - siage
    - ice_age

  # ── 대기질·대기화학 (air quality) ──
  mass_concentration_of_pm2p5_ambient_aerosol_in_air:
    - 초미세먼지
    - pm2.5
    - pm25
  mass_concentration_of_pm10_ambient_aerosol_in_air:
    - 미세먼지
    - pm10
  mole_fraction_of_ozone_in_air:
    - 오존
    - o3
  mole_fraction_of_nitrogen_dioxide_in_air:
    - 이산화질소
    - no2
  mole_fraction_of_sulfur_dioxide_in_air:
