    - 이산화황
    - so2
  mole_fraction_of_carbon_monoxide_in_air:
    - 일산화탄소
  atmosphere_optical_thickness_due_to_aerosol:
    - aod
    - 에어로졸광학두께

  # ── 수문·하천 (hydrology) ──
  water_volume_transport_in_river_channel:
    - 유량
    - 하천유량
    - discharge
    - streamflow
  river_discharge:
    - 방류량
  runoff_amount:
    - 유출량
    - runoff

  # ── 육상(지표) (land surface) ──
  mass_content_of_water_in_soil_layer:
    - 토양수분
    - soil_moisture
    - soilmoisture
  surface_temperature:
    - 지표온도
    - lst
  water_evapotranspiration_flux:
    - 증발산
    - evapotranspiration
  surface_snow_amount:
